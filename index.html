<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тёплые слова ✨</title>
<style>
  :root {
    --pink-50:  #fff0f6;
    --pink-100: #ffe0ec;
    --pink-200: #ffc6dc;
    --pink-300: #ffa3c5;
    --pink-400: #ff7eae;
    --pink-500: #ff5497;
    --pink-700: #c2185b;
    --text:    #5a2a45;
    --shadow:  0 10px 30px rgba(255, 84, 151, 0.25);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
    background: linear-gradient(135deg,
      #ffe0ec 0%,
      #ffc6dc 35%,
      #ffa3c5 65%,
      #ffd1e3 100%);
    background-attachment: fixed;
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow-x: hidden;
  }

  /* floating hearts background */
  .hearts {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .heart {
    position: absolute;
    font-size: 22px;
    opacity: 0;
    animation-timing-function: ease-in-out;
    animation-iteration-count: 1;
    will-change: transform, opacity;
  }

  /* четыре варианта траектории — нежно плывут в разные стороны */
  @keyframes driftA {
    0%   { transform: translate(0, 110vh)  rotate(-6deg) scale(0.85); opacity: 0; }
    15%  { opacity: 0.55; }
    50%  { transform: translate(40px,  50vh)  rotate(6deg)  scale(1);    opacity: 0.65; }
    85%  { opacity: 0.55; }
    100% { transform: translate(-30px, -15vh) rotate(-4deg) scale(1.1);  opacity: 0; }
  }
  @keyframes driftB {
    0%   { transform: translate(0, 110vh)  rotate(4deg)  scale(0.9);  opacity: 0; }
    15%  { opacity: 0.55; }
    50%  { transform: translate(-50px, 55vh) rotate(-8deg) scale(1.05); opacity: 0.7; }
    85%  { opacity: 0.5; }
    100% { transform: translate(60px, -10vh) rotate(8deg)  scale(1.15); opacity: 0; }
  }
  @keyframes driftC {
    0%   { transform: translate(0, 110vh)  rotate(0)     scale(0.8);  opacity: 0; }
    20%  { opacity: 0.5; }
    50%  { transform: translate(20px, 45vh) rotate(10deg)  scale(1.05); opacity: 0.6; }
    100% { transform: translate(-40px, -15vh) rotate(-6deg) scale(1);    opacity: 0; }
  }
  @keyframes driftD {
    0%   { transform: translate(0, 110vh)  rotate(-3deg) scale(0.9); opacity: 0; }
    25%  { opacity: 0.55; }
    50%  { transform: translate(-30px, 50vh) rotate(4deg)  scale(1);   opacity: 0.65; }
    100% { transform: translate(30px, -12vh) rotate(-2deg) scale(1.12); opacity: 0; }
  }

  .container {
    position: relative;
    z-index: 1;
    background: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 32px;
    padding: 40px 32px;
    max-width: 560px;
    width: 100%;
    box-shadow: var(--shadow);
    border: 1px solid rgba(255, 255, 255, 0.8);
    text-align: center;
  }

  /* экраны */
  .screen {
    display: none;
    animation: fadeIn 0.4s ease both;
  }
  .screen.active { display: block; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .back-link {
    background: none;
    border: none;
    color: var(--pink-700);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    padding: 0;
    margin-bottom: 14px;
    opacity: 0.8;
  }
  .back-link:hover { opacity: 1; }

  .selected-name {
    font-size: 13px;
    color: var(--pink-500);
    margin: 0 0 18px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }
  .selected-name b { color: var(--pink-700); }

  h1 {
    margin: 0 0 8px;
    font-size: 28px;
    font-weight: 700;
    color: var(--pink-700);
    letter-spacing: -0.5px;
  }

  .subtitle {
    margin: 0 0 28px;
    font-size: 15px;
    color: var(--pink-500);
    opacity: 0.9;
  }

  .daily {
    background: linear-gradient(135deg, var(--pink-100), var(--pink-200));
    border-radius: 20px;
    padding: 18px 22px;
    margin-bottom: 24px;
    border: 1px dashed var(--pink-300);
  }

  .names-label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--pink-700);
    margin-bottom: 10px;
    font-weight: 600;
    text-align: left;
  }
  .names {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 22px;
    justify-content: center;
  }
  .chip {
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    padding: 9px 18px;
    border-radius: 999px;
    border: 2px solid var(--pink-200);
    background: white;
    color: var(--pink-700);
    cursor: pointer;
    transition: transform 0.15s, background 0.2s, box-shadow 0.2s, border-color 0.2s, color 0.2s;
  }
  .chip:hover {
    transform: translateY(-2px);
    background: var(--pink-50);
  }
  .chip.active {
    background: linear-gradient(135deg, var(--pink-400), var(--pink-500));
    color: white;
    border-color: var(--pink-500);
    box-shadow: 0 6px 16px rgba(255, 84, 151, 0.35);
  }
  .daily-label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--pink-700);
    margin-bottom: 8px;
    font-weight: 600;
  }
  .daily-text {
    font-size: 17px;
    line-height: 1.5;
    color: var(--text);
    font-style: italic;
  }

  .message-box {
    min-height: 140px;
    padding: 28px 24px;
    border-radius: 24px;
    background: linear-gradient(135deg, #ffffff, var(--pink-50));
    border: 2px solid var(--pink-200);
    font-size: 20px;
    line-height: 1.55;
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.35s cubic-bezier(.34,1.56,.64,1), opacity 0.25s;
    margin-bottom: 24px;
  }
  .message-box.pop {
    transform: scale(1.04);
  }
  .message-box.fade {
    opacity: 0;
  }

  .actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }

  button {
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    padding: 14px 26px;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.2s, background 0.2s;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--pink-400), var(--pink-500));
    color: white;
    box-shadow: 0 6px 18px rgba(255, 84, 151, 0.4);
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 22px rgba(255, 84, 151, 0.5);
  }
  .btn-primary:active {
    transform: translateY(0);
  }

  .btn-secondary {
    background: white;
    color: var(--pink-700);
    border: 2px solid var(--pink-200);
  }
  .btn-secondary:hover {
    background: var(--pink-50);
    transform: translateY(-2px);
  }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(120%);
    background: var(--pink-500);
    color: white;
    padding: 12px 22px;
    border-radius: 999px;
    font-size: 14px;
    box-shadow: var(--shadow);
    transition: transform 0.35s cubic-bezier(.34,1.56,.64,1);
    z-index: 10;
  }
  .toast.show {
    transform: translateX(-50%) translateY(0);
  }

  footer {
    margin-top: 22px;
    font-size: 12px;
    color: var(--pink-500);
    opacity: 0.7;
  }
</style>
</head>

  function showScreen(el) {

    el.classList.add('active');

  // ── Daily wish (deterministic per date) ───────────────────────
  function dailyIndex(arr) {
    const d = new Date();
    const key = d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
    return key % arr.length;
  }
  dailyText.textContent = dailyWishes[dailyIndex(dailyWishes)];

  // ── Random compliment ─────────────────────────────────────────
  let lastIdx = -1;
  function poolFor(name) {
    const personal = personalCompliments[name] || [];
    const shared = compliments.map(c => c.replace(/\{name\}/g, name));
    return personal.concat(shared);
  }
  function pickCompliment() {
    if (!selectedName) return '🌸';
    const pool = poolFor(selectedName);
    let i;
    do { i = Math.floor(Math.random() * pool.length); }
    while (i === lastIdx && pool.length > 1);
    lastIdx = i;
    return pool[i];
  }

  function showNew() {
    messageBox.classList.add('fade');
    setTimeout(() => {
      messageBox.textContent = pickCompliment();
      messageBox.classList.remove('fade');
      messageBox.classList.add('pop');
      setTimeout(() => messageBox.classList.remove('pop'), 350);
    }, 220);
  }

    const h = document.createElement('div');
    h.className = 'heart';
    h.textContent = heartChars[Math.floor(Math.random() * heartChars.length)];

    // случайная траектория и медленная длительность для нежности
    const drift = drifts[Math.floor(Math.random() * drifts.length)];
    const dur = 16 + Math.random() * 14; // 16–30 сек, плавно
    h.style.animationName = drift;
    h.style.animationDuration = dur + 's';
    heartsLayer.appendChild(h);
    setTimeout(() => h.remove(), dur * 1000);
  }

  // ── Save as image (1080×1080 PNG) ─────────────────────────────
  const saveBtn = document.getElementById('saveBtn');
  const canvas  = document.getElementById('cardCanvas');

  // Перенос текста по словам с заданной шириной
  function wrapText(ctx, text, maxWidth) {
    const words = text.split(' ');
    const lines = [];
    let line = '';
    for (const w of words) {
      const test = line ? line + ' ' + w : w;
      if (ctx.measureText(test).width > maxWidth && line) {
        lines.push(line);
        line = w;
      } else {
        line = test;
      }
    }
    if (line) lines.push(line);
    return lines;
  }

  function renderCard() {
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;

    // фон — розовый градиент (как у сайта)
    const grad = ctx.createLinearGradient(0, 0, W, H);
    grad.addColorStop(0,    '#fff0f6');
    grad.addColorStop(0.5,  '#ffc6dc');
    grad.addColorStop(1,    '#ffe0ec');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // декоративные сердечки по углам
    ctx.font = '64px "Segoe UI Emoji", "Apple Color Emoji", sans-serif';
    ctx.globalAlpha = 0.45;
    ctx.fillText('💗', 60, 120);
    ctx.fillText('🌸', W - 130, 130);
    ctx.fillText('🌷', 70, H - 80);
    ctx.fillText('✨', W - 130, H - 80);
    ctx.globalAlpha = 1;

    // «для <Имя> 💗» сверху
    ctx.fillStyle = '#c2185b';
    ctx.font = '600 44px "Segoe UI", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(`для ${selectedName} 💗`, W / 2, 200);

    // комплимент по центру, с переносами
    ctx.fillStyle = '#5a2a45';
    ctx.font = '600 56px "Segoe UI", sans-serif';
    const text = messageBox.textContent.trim();
    const lines = wrapText(ctx, text, W - 200);
    const lineHeight = 80;
    const totalH = lines.length * lineHeight;
    let y = (H - totalH) / 2 + lineHeight / 2;
    for (const ln of lines) {
      ctx.fillText(ln, W / 2, y);
      y += lineHeight;
    }

    // подпись снизу
    ctx.fillStyle = '#ff5497';
    ctx.font = '500 32px "Segoe UI", sans-serif';
    ctx.fillText('тёплые слова ✨', W / 2, H - 100);
  }

  saveBtn.addEventListener('click', () => {
    if (!selectedName) return;
    renderCard();
    const link = document.createElement('a');
    const safeName = selectedName.replace(/\s+/g, '_');
    link.download = `тёплые-слова-${safeName}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  });
